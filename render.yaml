services:
  - type: web
    name: carrera-baraja-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web_app:app
    rootDir: backend
    envVars:
      - key: PORT
        value: 5000

  - type: web
    name: carrera-baraja-frontend
    env: static
    buildCommand: npm install && npm run build
    publishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          name: carrera-baraja-backend
          type: web
          property: host
